# AIDA validation registry
#
# Define command_id and processor_id specifications referenced by validation_policy.yaml.
registry:
  includes: []
  commands:
    lint_backend:
      argv: ["make", "lint-backend"]
      cwd: "{workspace_root}"
      timeout_sec: 1200

    lint_frontend:
      argv: ["make", "lint-frontend"]
      cwd: "{workspace_root}"
      timeout_sec: 1200

    lint_all:
      argv: ["make", "lint-all"]
      cwd: "{workspace_root}"
      timeout_sec: 1800

    types_backend:
      argv: ["make", "types-backend"]
      cwd: "{workspace_root}"
      timeout_sec: 600

    types_frontend:
      argv: ["make", "types-frontend"]
      cwd: "{workspace_root}"
      timeout_sec: 1200

    types_all:
      argv: ["make", "types-all"]
      cwd: "{workspace_root}"
      timeout_sec: 1200

    test_backend:
      argv: ["make", "test-backend"]
      cwd: "{workspace_root}"
      timeout_sec: 1800

    test_e2e_frontend:
      argv: ["make", "test-e2e-frontend"]
      cwd: "{workspace_root}"
      timeout_sec: 3600

    test_integration_backend:
      argv: ["make", "test-integration-backend"]
      cwd: "{workspace_root}"
      timeout_sec: 2400

    test_integration_frontend:
      argv: ["make", "test-integration-frontend"]
      cwd: "{workspace_root}"
      timeout_sec: 3600

    test_all:
      argv: ["make", "test-all"]
      cwd: "{workspace_root}"
      timeout_sec: 3600
  processors: {}
