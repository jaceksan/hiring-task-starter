id: prague_population_infrastructure_small
title: "Prague: Population & Infrastructure (GeoParquet)"

# Prague-clipped subset of the CZ infrastructure dataset, stored as GeoParquet.
# Intended as a small, reproducible fixture to exercise the DuckDB+GeoParquet path.
dataSize: small
enabled: true
default: true
runtime:
  enginePolicy: auto

defaultView:
  center:
    lat: 50.0755
    lon: 14.4378
  zoom: 10.5

examplePrompts:
  - "show layers"
  - "how many places are flooded?"
  - "show me escape roads for places in flood zone"
  - "show safest nearby places outside selected flood risk with reachable roads"

layers:
  - id: roads
    title: "Roads (lines)"
    kind: lines
    source:
      type: geoparquet
      path: data/derived/czech_population_infrastructure_large/prague_bbox/roads.parquet
      geoparquet:
        idColumn: osm_id
        nameColumn: COALESCE(ref, name)
        classColumn: fclass
        geometryColumn: geometry
        propertyColumns: [ref, oneway, maxspeed, bridge, tunnel, code]
        # Keep consistent with the large scenario; decode geometry progressively by class.
        minZoomForGeometry: 11.5
        renderPolicy:
          # Show a readable “overview” at low zoom by decoding only major road classes,
          # then progressively allow smaller classes as the user zooms in.
          minZoomForGeometryByClass:
            motorway: 6.0
            motorway_link: 6.0
            trunk: 6.0
            trunk_link: 6.0
            primary: 6.5
            primary_link: 6.5
            secondary: 7.0
            secondary_link: 7.0
            tertiary: 9.0
            tertiary_link: 9.0
            # Minor classes are dense even in Prague; keep them off until high zoom.
            residential: 13.5
            unclassified: 13.5
            service: 14.0
            living_street: 14.0
            cycleway: 14.5
            busway: 14.5
            footway: 15.0
            path: 15.0
            steps: 15.5
            track: 15.5
            track_grade1: 15.5
            track_grade2: 15.5
            track_grade3: 15.5
            track_grade4: 15.5
            track_grade5: 15.5
            pedestrian: 15.5
            bridleway: 15.5
    style:
      line:
        color: "rgba(55, 71, 79, 0.55)"
        width: 1

  - id: flood_zones
    title: "Flood zones (polygons)"
    kind: polygons
    source:
      type: geoparquet
      path: data/derived/czech_population_infrastructure_large/prague_bbox/flood_zones.parquet
      geoparquet:
        idColumn: osm_id
        nameColumn: water_name
        classColumn: flood_risk_level
        geometryColumn: geometry
        propertyColumns: [water_name, source_fclass, code]
        minZoomForGeometry: 11.5
    style:
      fillcolor: "rgba(30, 136, 229, 0.15)"
      line:
        color: "rgba(30, 136, 229, 0.45)"
        width: 1
    metadata:
      floodRisk:
        property: fclass
        waterEntityProperty: name
        defaultFillColor: "rgba(30, 136, 229, 0.15)"
        bands:
          - id: high
            label: "High (100y)"
            value: high
            fillColor: "rgba(229, 57, 53, 0.35)"
            lineColor: "rgba(229, 57, 53, 0.75)"
          - id: medium
            label: "Medium (50y+)"
            value: medium
            fillColor: "rgba(251, 140, 0, 0.28)"
            lineColor: "rgba(251, 140, 0, 0.70)"
          - id: low
            label: "Any risk"
            value: low
            fillColor: "rgba(30, 136, 229, 0.20)"
            lineColor: "rgba(30, 136, 229, 0.60)"

  - id: places
    title: "Places (points)"
    kind: points
    source:
      type: geoparquet
      path: data/derived/czech_population_infrastructure_large/prague_bbox/places.parquet
      geoparquet:
        idColumn: osm_id
        nameColumn: name
        classColumn: fclass
        geometryColumn: geometry
        propertyColumns: [population, place_source, code]
    style:
      marker:
        size: 6
        color: "rgba(255, 193, 7, 0.60)"

routing:
  primaryPointsLayerId: places
  maskPolygonsLayerId: flood_zones
  pointLabelSingular: place
  pointLabelPlural: places
  maskLabel: flood zones
  showLayersKeywords: ["show layers", "help", "reset", "start over"]
  countKeywords: ["how many"]
  maskKeywords: ["flood", "flooded", "water"]
  recommendKeywords: ["recommend", "find"]
  highlightRules:
    - keywords: ["show flooded places", "highlight flooded places"]
      layerId: places
      title: "Flooded places"
      maxFeatures: 500
      maskLayerId: flood_zones
      maskMode: IN_MASK

plot:
  highlightLayerId: places

