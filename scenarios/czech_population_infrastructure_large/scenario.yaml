id: czech_population_infrastructure_large
title: "Czech Republic: Population & Infrastructure (Large)"

# GeoParquet-backed large scenario (query-on-read via DuckDB `read_parquet()`).
enabled: true
dataSize: large
default: false
runtime:
  enginePolicy: auto

defaultView:
  center:
    lat: 49.8175
    lon: 15.4730
  zoom: 6.6

examplePrompts:
  - "how many places are flooded?"
  - "show me escape roads for places in flood zone"
  - "show safest nearby places outside selected flood risk with reachable roads"

layers:
  - id: roads
    title: "Roads (lines)"
    kind: lines
    source:
      type: geoparquet
      path: data/derived/czech_population_infrastructure_large/cz_bbox/roads.parquet
      geoparquet:
        idColumn: osm_id
        nameColumn: COALESCE(ref, name)
        classColumn: fclass
        geometryColumn: geometry
        propertyColumns: [ref, oneway, maxspeed, bridge, tunnel, code]
        minZoomForGeometry: 11.5
        renderPolicy:
          # Show a readable “overview” at low zoom by decoding only major road classes,
          # then progressively allow smaller classes as the user zooms in.
          minZoomForGeometryByClass:
            motorway: 6.0
            motorway_link: 6.0
            trunk: 7.0
            trunk_link: 7.0
            primary: 8.8
            primary_link: 8.8
            secondary: 9.8
            secondary_link: 9.8
            tertiary: 11.2
            tertiary_link: 11.2
            # Minor classes are extremely dense in the CZ dataset. Keep them off until very
            # high zoom; otherwise decoding + JSON serialization become unstable (multi-second).
            residential: 13.5
            unclassified: 13.5
            service: 14.0
            living_street: 14.0
            cycleway: 14.5
            busway: 14.5
            footway: 15.0
            path: 15.0
            steps: 15.5
            track: 15.5
            track_grade1: 15.5
            track_grade2: 15.5
            track_grade3: 15.5
            track_grade4: 15.5
            track_grade5: 15.5
            pedestrian: 15.5
            bridleway: 15.5
          # Hard cap of “geometry candidates” before any Python simplification/LOD.
          # Keys are maxZoom thresholds.
          maxCandidatesByZoom:
            7.5: 9000
            9.0: 10000
            12.0: 14000
            13.5: 22000
            15.0: 36000
            24.0: 50000
    style:
      line:
        color: "rgba(55, 71, 79, 0.55)"
        width: 1

  - id: flood_zones
    title: "Flood zones (polygons)"
    kind: polygons
    source:
      type: geoparquet
      path: data/derived/czech_population_infrastructure_large/cz_bbox/flood_zones.parquet
      geoparquet:
        idColumn: osm_id
        nameColumn: water_name
        classColumn: flood_risk_level
        geometryColumn: geometry
        propertyColumns: [water_name, source_fclass]
        minZoomForGeometry: 11.5
        renderPolicy:
          # Same idea as roads: show only the most significant water polygons when zoomed out.
          minZoomForGeometryByClass:
            extreme: 6.0
            very_high: 6.5
            high: 7.0
            medium: 8.0
            low: 9.5
          maxCandidatesByZoom:
            7.5: 600
            9.0: 1200
            12.0: 3500
            24.0: 6000
    style:
      fillcolor: "rgba(30, 136, 229, 0.09)"
      line:
        color: "rgba(30, 136, 229, 0.28)"
        width: 1
    metadata:
      floodRisk:
        property: fclass
        waterEntityProperty: name
        defaultFillColor: "rgba(30, 136, 229, 0.09)"
        bands:
          - id: extreme
            label: "Extreme"
            value: extreme
            fillColor: "rgba(183, 28, 28, 0.14)"
            lineColor: "rgba(183, 28, 28, 0.42)"
          - id: very_high
            label: "Very High"
            value: very_high
            fillColor: "rgba(211, 47, 47, 0.12)"
            lineColor: "rgba(211, 47, 47, 0.38)"
          - id: high
            label: "High"
            value: high
            fillColor: "rgba(229, 57, 53, 0.10)"
            lineColor: "rgba(229, 57, 53, 0.34)"
          - id: medium
            label: "Medium"
            value: medium
            fillColor: "rgba(255, 183, 77, 0.08)"
            lineColor: "rgba(245, 124, 0, 0.30)"
          - id: low
            label: "Low"
            value: low
            fillColor: "rgba(30, 136, 229, 0.05)"
            lineColor: "rgba(30, 136, 229, 0.24)"

  - id: places
    title: "Places (points)"
    kind: points
    source:
      type: geoparquet
      path: data/derived/czech_population_infrastructure_large/cz_bbox/places.parquet
      geoparquet:
        idColumn: osm_id
        nameColumn: name
        classColumn: fclass
        geometryColumn: geometry
        propertyColumns: [population, place_source, place_category]
        renderPolicy:
          # Keep the low-zoom overview interactive: this dataset contains *a lot* of place points.
          # Capping early dramatically reduces backend time spent scanning/reading candidates.
          maxCandidatesByZoom:
            7.5: 1500
            9.0: 3000
            12.0: 8000
            24.0: 15000
    style:
      marker:
        size: 6
        color: "rgba(255, 193, 7, 0.60)"

routing:
  primaryPointsLayerId: places
  maskPolygonsLayerId: flood_zones
  pointLabelSingular: place
  pointLabelPlural: places
  maskLabel: flood zones
  showLayersKeywords: ["show layers", "help", "reset", "start over"]
  countKeywords: ["how many"]
  maskKeywords: ["flood", "flooded", "water"]
  recommendKeywords: ["recommend", "find"]
  highlightRules:
    - keywords: ["show flooded places", "highlight flooded places"]
      layerId: places
      title: "Flooded places"
      maxFeatures: 500
      maskLayerId: flood_zones
      maskMode: IN_MASK

plot:
  highlightLayerId: places
