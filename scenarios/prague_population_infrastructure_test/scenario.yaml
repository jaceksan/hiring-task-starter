id: prague_population_infrastructure_test
title: "Prague: Population & Infrastructure (Test)"
dataSize: small
enabled: false
default: false
runtime:
  enginePolicy: auto

defaultView:
  center:
    lat: 50.0755
    lon: 14.4378
  zoom: 10.5

examplePrompts:
  - "how many places are flooded?"
  - "show me escape roads for places in flood zone"
  - "show safest nearby places outside selected flood risk with reachable roads"

layers:
  - id: roads
    title: "Roads (lines)"
    kind: lines
    source:
      type: geoparquet
      path: data/derived/czech_population_infrastructure_large/prague_bbox/roads.parquet
      geoparquet:
        idColumn: osm_id
        nameColumn: COALESCE(ref, name)
        classColumn: fclass
        geometryColumn: geometry
        propertyColumns: [ref, oneway, maxspeed, bridge, tunnel, code]
        minZoomForGeometry: 11.5
        renderPolicy:
          minZoomForGeometryByClass:
            motorway: 6.0
            motorway_link: 6.0
            trunk: 6.0
            trunk_link: 6.0
            primary: 6.5
            primary_link: 6.5
            secondary: 7.0
            secondary_link: 7.0
            tertiary: 9.0
            tertiary_link: 9.0
            residential: 13.5
            unclassified: 13.5
            service: 14.0
            living_street: 14.0
            cycleway: 14.5
            busway: 14.5
            footway: 15.0
            path: 15.0
            steps: 15.5
            track: 15.5
            track_grade1: 15.5
            track_grade2: 15.5
            track_grade3: 15.5
            track_grade4: 15.5
            track_grade5: 15.5
            pedestrian: 15.5
            bridleway: 15.5
          maxCandidatesByZoom:
            7.5: 400
            9.0: 800
            12.0: 1800
            24.0: 3200
    style:
      line:
        color: "rgba(55, 71, 79, 0.55)"
        width: 1

  - id: flood_zones
    title: "Flood zones (polygons)"
    kind: polygons
    source:
      type: geoparquet
      path: data/derived/czech_population_infrastructure_large/prague_bbox/flood_zones.parquet
      geoparquet:
        idColumn: osm_id
        nameColumn: water_name
        classColumn: flood_risk_level
        geometryColumn: geometry
        propertyColumns: [water_name, source_fclass]
        minZoomForGeometry: 10.0
        renderPolicy:
          minZoomForGeometryByClass:
            extreme: 6.0
            very_high: 6.5
            high: 7.0
            medium: 8.0
            low: 9.5
          maxCandidatesByZoom:
            7.5: 150
            9.0: 300
            12.0: 700
            24.0: 1400
    style:
      fillcolor: "rgba(30, 136, 229, 0.09)"
      line:
        color: "rgba(30, 136, 229, 0.28)"
        width: 1
    metadata:
      floodRisk:
        property: flood_risk_level
        waterEntityProperty: water_name
        defaultFillColor: "rgba(30, 136, 229, 0.09)"
        bands:
          - id: extreme
            label: "Extreme"
            value: extreme
            fillColor: "rgba(183, 28, 28, 0.14)"
            lineColor: "rgba(183, 28, 28, 0.42)"
          - id: very_high
            label: "Very High"
            value: very_high
            fillColor: "rgba(211, 47, 47, 0.12)"
            lineColor: "rgba(211, 47, 47, 0.38)"
          - id: high
            label: "High"
            value: high
            fillColor: "rgba(229, 57, 53, 0.10)"
            lineColor: "rgba(229, 57, 53, 0.34)"
          - id: medium
            label: "Medium"
            value: medium
            fillColor: "rgba(255, 183, 77, 0.08)"
            lineColor: "rgba(245, 124, 0, 0.30)"
          - id: low
            label: "Low"
            value: low
            fillColor: "rgba(30, 136, 229, 0.05)"
            lineColor: "rgba(30, 136, 229, 0.24)"

  - id: places
    title: "Places (points)"
    kind: points
    source:
      type: geoparquet
      path: data/derived/czech_population_infrastructure_large/prague_bbox/places.parquet
      geoparquet:
        idColumn: osm_id
        nameColumn: name
        classColumn: fclass
        geometryColumn: geometry
        propertyColumns: [population, place_source, place_category]
        renderPolicy:
          maxCandidatesByZoom:
            7.5: 500
            9.0: 1000
            12.0: 2000
            24.0: 5000
    style:
      marker:
        size: 6
        color: "rgba(255, 193, 7, 0.60)"

routing:
  primaryPointsLayerId: places
  maskPolygonsLayerId: flood_zones
  pointLabelSingular: place
  pointLabelPlural: places
  maskLabel: flood zones
  showLayersKeywords: ["show layers", "help", "reset", "start over"]
  countKeywords: ["how many"]
  maskKeywords: ["flood", "flooded", "water"]
  recommendKeywords: ["recommend", "find"]
  highlightRules:
    - keywords: ["show flooded places", "highlight flooded places"]
      layerId: places
      title: "Flooded places"
      maxFeatures: 500
      maskLayerId: flood_zones
      maskMode: IN_MASK

plot:
  highlightLayerId: places
